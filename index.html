<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제비뽑기</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff8f0;
      --card: #ffffff;
      --accent: #ff6b35;
      --accent2: #f7c59f;
      --dark: #2d2d2d;
      --muted: #888;
      --radius: 18px;
      --shadow: 0 8px 32px rgba(255,107,53,0.13);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 60px;
    }

    h1 {
      font-family: 'Jua', sans-serif;
      font-size: 2.4rem;
      color: var(--accent);
      letter-spacing: -1px;
      margin-bottom: 4px;
      text-align: center;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 32px;
      text-align: center;
    }

    /* ── 탭 ── */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      background: #f0e8e0;
      border-radius: 50px;
      padding: 5px;
    }
    .tab {
      font-family: 'Jua', sans-serif;
      font-size: 0.95rem;
      padding: 8px 22px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all .2s;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 3px 12px rgba(255,107,53,.3);
    }

    /* ── 공통 카드 ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 24px;
      width: 100%;
      max-width: 540px;
    }

    /* ── 설정 화면 ── */
    #setup { display: flex; flex-direction: column; gap: 16px; }

    label { font-size: 0.88rem; font-weight: 700; color: var(--dark); margin-bottom: 4px; display: block; }

    input[type="text"], textarea {
      width: 100%;
      border: 2px solid #f0e8e0;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border .2s;
      background: #fafafa;
      color: var(--dark);
      resize: vertical;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); background: #fff; }

    .item-list { display: flex; flex-direction: column; gap: 6px; }

    .item-row {
      display: flex; align-items: center; gap: 8px;
      background: #fff8f4;
      border-radius: 10px;
      padding: 8px 12px;
      border: 1.5px solid #f0e8e0;
      animation: slideIn .25s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }

    .item-row span {
      flex: 1;
      font-size: 0.93rem;
      color: var(--dark);
      word-break: break-all;
    }
    .item-row .num {
      font-family: 'Jua', sans-serif;
      color: var(--accent2);
      font-size: 0.85rem;
      min-width: 20px;
    }
    .del-btn {
      border: none; background: none; cursor: pointer;
      color: #ccc; font-size: 1.1rem; padding: 2px 4px;
      border-radius: 6px; transition: color .15s;
    }
    .del-btn:hover { color: var(--accent); }

    .add-row { display: flex; gap: 8px; }
    .add-row input { flex: 1; }

    .btn {
      font-family: 'Jua', sans-serif;
      font-size: 1rem;
      padding: 11px 22px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all .18s;
    }
    .btn-accent {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 14px rgba(255,107,53,.3);
    }
    .btn-accent:hover { filter: brightness(1.07); transform: translateY(-1px); }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
    }
    .btn-outline:hover { background: #fff4ee; }

    .quick-add { display: flex; flex-direction: column; gap: 6px; }
    .quick-add textarea { min-height: 90px; }

    .divider {
      text-align: center; color: var(--muted); font-size: 0.8rem;
      position: relative; margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: calc(50% - 24px); height: 1px; background: #f0e8e0;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .empty-hint { color: var(--muted); font-size: 0.87rem; text-align: center; padding: 12px 0; }

    /* ── 뽑기 화면 ── */
    #draw { display: flex; flex-direction: column; align-items: center; gap: 24px; }

    .mission-label {
      font-family: 'Jua', sans-serif;
      font-size: 1.05rem;
      color: var(--accent);
      text-align: center;
      word-break: break-all;
    }

    .remaining {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
    }

    /* 제비통 */
    .jar-wrap {
      position: relative;
      width: 200px; height: 200px;
      display: flex; align-items: center; justify-content: center;
    }
    .jar {
      width: 160px; height: 160px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff8f0 0%, #ffe5d0 100%);
      border: 4px solid var(--accent2);
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
      box-shadow: 0 8px 32px rgba(255,107,53,.15);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .jar:hover { transform: scale(1.05); box-shadow: 0 12px 40px rgba(255,107,53,.25); }
    .jar:active { transform: scale(0.97); }

    .jar.spinning {
      animation: jarSpin 0.7s cubic-bezier(.4,0,.2,1);
    }
    @keyframes jarSpin {
      0%   { transform: rotate(0deg) scale(1); }
      20%  { transform: rotate(-15deg) scale(1.08); }
      40%  { transform: rotate(20deg) scale(1.1); }
      60%  { transform: rotate(-10deg) scale(1.07); }
      80%  { transform: rotate(6deg) scale(1.03); }
      100% { transform: rotate(0deg) scale(1); }
    }

    /* 결과 카드 */
    .result-box {
      width: 100%;
      max-width: 380px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #ff6b35 0%, #ff9a76 100%);
      color: #fff;
      text-align: center;
      padding: 28px 20px;
      box-shadow: 0 10px 40px rgba(255,107,53,.35);
      animation: popIn .4s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes popIn {
      0%   { opacity:0; transform: scale(0.6) translateY(20px); }
      100% { opacity:1; transform: scale(1) translateY(0); }
    }
    .result-box .label { font-size: 0.85rem; opacity: .85; margin-bottom: 8px; }
    .result-box .result-text {
      font-family: 'Jua', sans-serif;
      font-size: 1.5rem;
      line-height: 1.4;
      word-break: break-all;
    }

    .history-list {
      width: 100%;
      max-width: 380px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .history-item {
      display: flex; align-items: center; gap: 8px;
      background: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      border: 1.5px solid #f0e8e0;
      animation: slideIn .2s ease;
    }
    .history-item .h-num {
      font-family: 'Jua', sans-serif;
      font-size: 0.82rem;
      color: var(--accent);
      min-width: 24px;
    }
    .history-item .h-text {
      font-size: 0.9rem;
      color: var(--dark);
      flex: 1;
    }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    .done-msg {
      font-family: 'Jua', sans-serif;
      font-size: 1.2rem;
      color: var(--accent);
      text-align: center;
      padding: 16px;
    }

    /* 파티클 */
    .confetti-wrap {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none; z-index: 999;
      overflow: hidden;
    }
    .confetti {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }

    /* 숨김 */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<h1>🎉 제비뽑기</h1>
<p class="subtitle">항목을 입력하고 랜덤으로 뽑아보세요!</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('setup')">⚙️ 항목 설정</button>
  <button class="tab" onclick="switchTab('draw')" id="drawTabBtn">🎲 뽑기 시작</button>
</div>

<!-- 설정 탭 -->
<div class="card" id="setup">
  <div style="margin-bottom:12px;">
    <label>📌 미션 / 활동 제목</label>
    <input type="text" id="missionInput" placeholder="예: 대응 관계를 실생활에서 찾아보기" />
  </div>

  <div class="quick-add">
    <label>📋 한꺼번에 붙여넣기 <span style="font-weight:400;color:#aaa">(줄바꿈으로 구분)</span></label>
    <textarea id="bulkInput" placeholder="예:&#10;자판기 버튼과 음료수&#10;신호등 색과 행동&#10;온도계 눈금과 온도"></textarea>
    <button class="btn btn-outline" onclick="bulkAdd()">+ 한꺼번에 추가</button>
  </div>

  <div class="divider" style="margin: 12px 0;">또는 하나씩 추가</div>

  <div class="add-row">
    <input type="text" id="singleInput" placeholder="항목 입력 후 Enter 또는 + 버튼" onkeydown="if(event.key==='Enter') addItem()" />
    <button class="btn btn-accent" onclick="addItem()">+</button>
  </div>

  <div style="height:12px;"></div>
  <div id="itemList" class="item-list"></div>
  <div id="emptyHint" class="empty-hint">아직 항목이 없어요. 위에서 추가해보세요 🙂</div>

  <div style="height:16px;"></div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="clearItems()">🗑 전체 삭제</button>
    <button class="btn btn-accent" onclick="startDraw()">🎲 뽑기 시작!</button>
  </div>
</div>

<!-- 뽑기 탭 -->
<div class="card hidden" id="draw">
  <div id="missionDisplay" class="mission-label"></div>
  <div id="remainingInfo" class="remaining"></div>

  <div class="jar-wrap">
    <div class="jar" id="jar" onclick="doDrawOne()" title="눌러서 뽑기!">🎱</div>
  </div>

  <p style="color:var(--muted);font-size:.82rem;text-align:center;">항아리를 눌러서 뽑아보세요!</p>

  <div id="resultBox"></div>

  <div id="historyList" class="history-list"></div>
  <div id="doneMsg" class="done-msg hidden">🎊 모든 항목을 다 뽑았어요!</div>

  <div class="btn-row" style="margin-top:8px;">
    <button class="btn btn-outline" onclick="resetDraw()">🔄 다시 시작</button>
    <button class="btn btn-outline" onclick="switchTab('setup')">⚙️ 항목 수정</button>
  </div>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<script>
  let items = [];
  let pool  = [];
  let drawn = [];

  /* ── 탭 전환 ── */
  function switchTab(t) {
    document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active', (i===0&&t==='setup')||(i===1&&t==='draw')));
    document.getElementById('setup').classList.toggle('hidden', t!=='setup');
    document.getElementById('draw').classList.toggle('hidden',  t!=='draw');
    if(t==='draw') initDraw();
  }

  /* ── 항목 관리 ── */
  function renderList() {
    const list = document.getElementById('itemList');
    const hint = document.getElementById('emptyHint');
    list.innerHTML = '';
    hint.style.display = items.length ? 'none' : 'block';
    items.forEach((it, i) => {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = `<span class="num">${i+1}</span><span>${it}</span><button class="del-btn" onclick="removeItem(${i})">✕</button>`;
      list.appendChild(row);
    });
  }

  function addItem() {
    const inp = document.getElementById('singleInput');
    const v = inp.value.trim();
    if(!v) return;
    items.push(v);
    inp.value = '';
    renderList();
    inp.focus();
  }

  function bulkAdd() {
    const ta = document.getElementById('bulkInput');
    const lines = ta.value.split('\n').map(l=>l.trim()).filter(Boolean);
    if(!lines.length) return;
    items.push(...lines);
    ta.value = '';
    renderList();
  }

  function removeItem(i) {
    items.splice(i,1);
    renderList();
  }

  function clearItems() {
    if(items.length && !confirm('정말 전체 삭제할까요?')) return;
    items = [];
    renderList();
  }

  /* ── 뽑기 초기화 ── */
  function startDraw() {
    if(!items.length) { alert('항목을 먼저 추가해주세요!'); return; }
    switchTab('draw');
  }

  function initDraw() {
    pool  = [...items];
    drawn = [];
    renderDraw();
    document.getElementById('jar').textContent = '🎱';
    document.getElementById('doneMsg').classList.add('hidden');
  }

  function resetDraw() {
    initDraw();
  }

  function renderDraw() {
    const mission = document.getElementById('missionInput').value.trim();
    document.getElementById('missionDisplay').textContent = mission ? `📌 ${mission}` : '';
    document.getElementById('remainingInfo').textContent = `남은 항목: ${pool.length}개 / 전체: ${items.length}개`;

    const histEl = document.getElementById('historyList');
    histEl.innerHTML = '';
    drawn.forEach((d,i)=>{
      const el = document.createElement('div');
      el.className = 'history-item';
      el.innerHTML = `<span class="h-num">${i+1}번째</span><span class="h-text">${d}</span>`;
      histEl.prepend(el);
    });

    document.getElementById('doneMsg').classList.toggle('hidden', pool.length !== 0);
    document.getElementById('jar').style.opacity = pool.length ? '1' : '0.4';
  }

  /* ── 실제 뽑기 ── */
  function doDrawOne() {
    if(!pool.length) return;

    const jar = document.getElementById('jar');
    jar.classList.remove('spinning');
    void jar.offsetWidth;
    jar.classList.add('spinning');
    jar.textContent = '🎲';

    setTimeout(()=>{
      const idx  = Math.floor(Math.random() * pool.length);
      const pick = pool.splice(idx, 1)[0];
      drawn.push(pick);

      jar.textContent = '✨';
      jar.classList.remove('spinning');

      showResult(pick);
      renderDraw();
      launchConfetti();
    }, 700);
  }

  function showResult(text) {
    const box = document.getElementById('resultBox');
    box.innerHTML = `
      <div class="result-box">
        <div class="label">🎉 뽑힌 항목</div>
        <div class="result-text">${text}</div>
      </div>`;
  }

  /* ── 색종이 ── */
  const colors = ['#ff6b35','#f7c59f','#ffe66d','#4ecdc4','#a8e6cf','#ff8b94','#c9b1ff'];
  function launchConfetti() {
    const wrap = document.getElementById('confettiWrap');
    wrap.innerHTML = '';
    for(let i=0;i<60;i++){
      const el = document.createElement('div');
      el.className='confetti';
      el.style.cssText=`
        left:${Math.random()*100}vw;
        top:-12px;
        background:${colors[i%colors.length]};
        width:${6+Math.random()*8}px;
        height:${6+Math.random()*8}px;
        border-radius:${Math.random()>0.5?'50%':'2px'};
        animation-duration:${1.2+Math.random()*1.2}s;
        animation-delay:${Math.random()*0.4}s;
      `;
      wrap.appendChild(el);
    }
    setTimeout(()=>wrap.innerHTML='', 2800);
  }

  /* 초기 렌더 */
  renderList();
</script>
</body>
</html>
